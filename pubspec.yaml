name: whatsapp_fcm
description: 'A Flutter project with Firebase Cloud Messaging and notifications.'
publish_to: 'none' # Prevent accidental publishing

version: 1.0.0+1

environment:
  sdk: '>=3.11.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^4.6.0

  # Firebase Messaging (push notifications)
  firebase_messaging: ^16.1.3

  # Local notifications
  flutter_local_notifications: ^21.0.0
  overlay_support: ^2.0.5

  # Persistent storage
  shared_preferences: ^2.2.0

  # Internationalization
  intl: ^0.20.2

  # iOS-style icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Uncomment to add assets
  # assets:
  #   - assets/images/

  # Uncomment to add custom fonts
  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: fonts/YourFont-Regular.ttf
